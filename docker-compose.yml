version: '3.9'

services:
  # Frontend - Crypto Dashboard
  crypto-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-dashboard
    ports:
      - '4200:80'
    environment:
      NODE_ENV: production
    depends_on:
      - cpp-rest-api
      - favorites-api
      - cache-proxy-api
    networks:
      - app-network
    restart: unless-stopped

  # Backend - C++ REST API
  cpp-rest-api:
    build:
      context: ./backend/cpp-rest-api
      dockerfile: Dockerfile
    container_name: cpp-rest-api
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: ${DB_NAME:-apidb}
      DB_USER: ${DB_USER:-apiuser_test}
      DB_PASS: ${DB_PASS:-apipass_test}
      APP_PORT: '8080'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:4200}
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Favorites Microservice - Go API
  favorites-api:
    build:
      context: ./backend/favorites-api
      dockerfile: Dockerfile
    container_name: favorites-api
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: ${DB_NAME:-apidb}
      DB_USER: ${DB_USER:-apiuser_test}
      DB_PASS: ${DB_PASS:-apipass_test}
      APP_PORT: '8090'
      AUTH_API_URL: http://cpp-rest-api:8080
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:4200}
    ports:
      - '8090:8090'
    depends_on:
      postgres:
        condition: service_healthy
      cpp-rest-api:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  # Database UI - Adminer
  adminer:
    image: adminer:latest
    container_name: app-adminer
    ports:
      - '8888:8080'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Cache Proxy Microservice - Rust API
  cache-proxy-api:
    build:
      context: ./backend/cache-proxy-api
      dockerfile: Dockerfile
    container_name: cache-proxy-api
    environment:
      PORT: '8070'
      REDIS_URL: 'redis://redis:6379'
      PROXY_CONFIG_PATH: '/app/src/config/proxy-config.json'
    volumes:
      - ./backend/cache-proxy-api/src/config:/app/src/config:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Redis - Cache store for cache-proxy-api
  redis:
    image: redis:7-alpine
    container_name: app-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  # Database
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-apidb}
      POSTGRES_USER: ${DB_USER:-apiuser_test}
      POSTGRES_PASSWORD: ${DB_PASS:-apipass_test}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-apiuser_test} -d ${DB_NAME:-apidb}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

# Networks
networks:
  app-network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
  redis_data:
